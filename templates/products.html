<!DOCTYPE html>
<html>
<head>
    <title>Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand text-white fw-bold">Products</span>

    <div>
        <a href="/cart" class="btn btn-warning me-3">
            Cart ({{ cart_count }})
        </a>
        <a href="/logout" class="btn btn-danger">
            Logout
        </a>
    </div>
</nav>

<div class="container mt-4">
    <div class="row">

        {% for product in products %}
        <div class="col-md-4">
            <div class="card shadow-sm mb-4 p-3 h-100">
                
                <h5 class="fw-bold">{{ product[1] }}</h5>
                <p class="text-muted">{{ product[2] }}</p>

                <h6 class="text-success">₹ {{ product[3] }}</h6>
                <p>Stock: {{ product[4] }}</p>

                <form action="/add_to_cart" method="POST">
                    <input type="hidden" name="product_id" value="{{ product[0] }}">
                    <input type="number" name="quantity" min="1" value="1" class="form-control mb-2">
                    <button class="btn btn-primary w-100">Add to Cart</button>
                </form>

            </div>
        </div>
        {% endfor %}

    </div>
</div>

</body>
</html>
